<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Проверка контрагента</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        input { padding: 10px; width: 300px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0069d9; }
        .error { color: red; margin-top: 20px; background: #ffebee; padding: 10px; border-radius: 5px; }
        .success { color: green; margin-top: 20px; background: #e8f5e9; padding: 10px; border-radius: 5px; }
        .nav { margin-top: 30px; }
        .nav a { margin-right: 15px; color: #007bff; text-decoration: none; }
        h1 { color: #333; }
    </style>
</head>
<body>
<div class="container">
    <h1>Проверка контрагента</h1>

    <p>Введите ИНН или ОГРН юридического лица</p>

    <form th:action="@{/verify}" method="post">
        <div>
            <input type="text" name="innOgrn" placeholder="Например: 7707083893" required/>
        </div>
        <button type="submit">Проверить</button>
    </form>

    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>

    <div class="nav">
        <a href="/history">История проверок</a>
        <a href="/logout">Выйти</a>
    </div>
</div>
</body>
</html>
