<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Отчёт по контрагенту</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .report {
            background: #f0f0f0;
            padding: 15px;
            white-space: pre-wrap;
            font-family: monospace;
            border-radius: 5px;
            margin: 20px 0;
        }
        .error {
            color: red;
            background: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .nav { margin-top: 20px; }
        .nav a, .nav button {
            display: inline-block;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .button-back { background: #007bff; color: white; border: none; }
        .button-back:hover { background: #0069d9; }
        .button-logout { background: #dc3545; color: white; border: none; }
        .button-logout:hover { background: #c82333; }
        .button-download { background: #28a745; color: white; border: none; }
        .button-download:hover { background: #218838; }
        hr { margin: 20px 0; }
        h1 { color: #333; }
    </style>
</head>
<body>
<div class="container">
    <h1>Отчёт по контрагенту</h1>

    <div th:if="${report}" class="report">
        <pre th:text="${report}"></pre>
    </div>

    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>

    <hr/>

    <div class="nav">
        <a href="/" class="button-back">На главную</a>
        <button onclick="downloadReport()" class="button-download">Скачать отчёт</button>
        <a href="/logout" class="button-logout">Выйти</a>
    </div>
</div>

<script>
    function downloadReport() {
        const reportText = document.querySelector('pre').innerText;
        const blob = new Blob([reportText], {type: 'text/plain;charset=utf-8'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'report.txt';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
